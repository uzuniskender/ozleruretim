<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>UYS Veri Aktarım</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
body{font-family:sans-serif;max-width:600px;margin:40px auto;padding:20px;background:#1a1a2e;color:#e0e0e0}
h1{color:#00d4aa;font-size:1.4em}
#log{background:#0d0d1a;padding:16px;border-radius:8px;white-space:pre-wrap;font-family:monospace;font-size:13px;line-height:1.6;margin-top:16px}
input[type=file]{margin:16px 0;padding:12px;background:#222;border:1px solid #444;border-radius:8px;color:#fff;width:100%;cursor:pointer}
.ok{color:#00ff88}.fail{color:#ff4444}
</style>
</head>
<body>
<h1>📦 UYS Veri Aktarım Aracı</h1>
<p>localStorage'dan dışa aktardığın <code>uys_backup.txt</code> dosyasını seç:</p>
<input type="file" id="f" accept=".txt,.json">
<div id="log"></div>
<script>
const log=document.getElementById('log');
function w(msg,cls){log.innerHTML+='<span class="'+(cls||'')+'">'+(msg)+'</span>\n';}

const sb=window.supabase.createClient(
  'https://kudpuqqoxkhuxhhxqbjw.supabase.co',
  'sb_publishable_duHYEBjaaf4wDQvZLf66hQ_tSmyDM4p'
);

document.getElementById('f').addEventListener('change',async(e)=>{
  const file=e.target.files[0];
  if(!file){w('Dosya seçilmedi','fail');return;}
  w('Dosya okunuyor: '+file.name+' ('+Math.round(file.size/1024)+' KB)...');
  
  const text=await file.text();
  let data;
  try{
    data=JSON.parse(text);
    w('JSON parse başarılı','ok');
  }catch(err){
    w('❌ Geçersiz JSON: '+err.message,'fail');
    return;
  }
  
  // Özet
  w('━━━ VERİ ÖZETİ ━━━');
  const keys=['operations','stations','malzemeler','bomTrees','recipes','orders','workOrders','logs','tedarikler','operators','stokHareketler','kesimPlanlari','customers','durusKodlari','fireLogs','consumption','warehouse'];
  keys.forEach(k=>{
    const arr=data[k];
    if(arr&&Array.isArray(arr)&&arr.length>0) w('  '+k+': '+arr.length+' kayıt');
  });
  
  w('\nSupabase\'e aktarılıyor...');
  
  // Ayarlar tablosuna tek satır olarak yaz
  const{error}=await sb.from('ayarlar').upsert({key:'uys_data',value:text});
  if(error){
    w('❌ Supabase hatası: '+error.message,'fail');
    return;
  }
  
  w('\n✅ Aktarım tamamlandı!','ok');
  w('\nŞimdi ana sayfayı aç:');
  w('<a href="index.html" style="color:#00d4aa">→ UYS\'ye Git</a>');
  
  // Doğrulama
  const{data:check,error:e2}=await sb.from('ayarlar').select('value').eq('key','uys_data').single();
  if(!e2&&check){
    w('Doğrulama: '+Math.round(check.value.length/1024)+' KB kaydedildi ✅','ok');
  }
});
</script>
</body>
</html>
