<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Özler UYS — Operatör</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0f14;--bg2:#161a22;--bg3:#1e232d;
  --t1:#f0f2f5;--t2:#9ba3b2;--t3:#5c657a;
  --acc:#00d4aa;--acc2:#00b894;--accD:rgba(0,212,170,.12);
  --warn:#ffb142;--warnD:rgba(255,177,66,.12);
  --err:#ff6b6b;--errD:rgba(255,107,107,.12);
  --ok:#00e676;--okD:rgba(0,230,118,.12);
  --r:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;-webkit-tap-highlight-color:transparent;overflow-x:hidden}

/* HEADER */
.hdr{background:var(--bg2);border-bottom:1px solid var(--bg3);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr h1{font-size:15px;font-weight:600;color:var(--acc);letter-spacing:.5px}
.hdr .sync{font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.hdr .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.hdr .dot.on{background:var(--ok)}.hdr .dot.off{background:var(--err)}

/* TAB BAR */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bg3);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{flex:1;min-width:0;padding:14px 8px;text-align:center;font-size:13px;font-weight:500;color:var(--t3);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:.2s}
.tab.act{color:var(--acc);border-bottom-color:var(--acc);background:var(--accD)}

/* CONTENT */
.content{padding:12px}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--r);padding:16px;margin-bottom:10px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.card:active{transform:scale(.98);background:var(--bg3)}
.card .lbl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-family:'JetBrains Mono',monospace;margin-bottom:6px}
.card .val{font-size:20px;font-weight:700;line-height:1.2}
.card .sub{font-size:13px;color:var(--t2);margin-top:4px}
.card .badge{position:absolute;top:12px;right:12px;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;font-family:'JetBrains Mono',monospace}
.badge.ok{background:var(--okD);color:var(--ok)}
.badge.warn{background:var(--warnD);color:var(--warn)}
.badge.err{background:var(--errD);color:var(--err)}
.badge.prog{background:var(--accD);color:var(--acc)}

/* PROGRESS BAR */
.pbar{height:6px;background:var(--bg);border-radius:3px;margin-top:10px;overflow:hidden}
.pbar .fill{height:100%;border-radius:3px;transition:width .4s ease}
.pbar .fill.g{background:var(--ok)}.pbar .fill.y{background:var(--warn)}.pbar .fill.r{background:var(--err)}.pbar .fill.a{background:var(--acc)}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:20px 16px 32px;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal .handle{width:40px;height:4px;background:var(--bg3);border-radius:2px;margin:0 auto 16px}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px}
.modal .info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bg3);font-size:14px}
.modal .info-row .k{color:var(--t3)}.modal .info-row .v{font-weight:600;font-family:'JetBrains Mono',monospace}

/* INPUT GROUP */
.inp-grp{margin:20px 0 12px}
.inp-grp label{display:block;font-size:12px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-family:'JetBrains Mono',monospace}
.inp-grp input,.inp-grp select{width:100%;padding:16px;font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;background:var(--bg);border:2px solid var(--bg3);border-radius:var(--r);color:var(--t1);text-align:center;outline:none;-webkit-appearance:none}
.inp-grp input:focus,.inp-grp select:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--accD)}
.inp-grp select{font-size:16px;text-align:left;padding:14px}

/* QUICK NUM PAD */
.numpad{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}
.numpad button{padding:14px;font-size:18px;font-weight:600;font-family:'JetBrains Mono',monospace;background:var(--bg3);border:none;border-radius:var(--r);color:var(--t1);cursor:pointer;transition:.15s}
.numpad button:active{background:var(--acc);color:var(--bg);transform:scale(.95)}
.numpad .del{background:var(--errD);color:var(--err)}
.numpad .clr{background:var(--warnD);color:var(--warn)}

/* ACTION BUTTONS */
.btn{width:100%;padding:18px;font-size:16px;font-weight:700;border:none;border-radius:var(--r);cursor:pointer;transition:.15s;font-family:'Outfit',sans-serif;letter-spacing:.5px}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--acc);color:var(--bg)}
.btn.secondary{background:var(--bg3);color:var(--t1);margin-top:8px}
.btn.danger{background:var(--err);color:#fff}
.btn:disabled{opacity:.4;pointer-events:none}

/* STATUS PILL */
.pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;font-family:'JetBrains Mono',monospace}
.pill.ks{background:#4a148c44;color:#ce93d8}
.pill.mk{background:#1a237e44;color:#90caf9}
.pill.mm{background:#00695c44;color:#80cbc4}

/* TOAST */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--acc);color:var(--bg);padding:12px 24px;border-radius:var(--r);font-weight:600;font-size:14px;z-index:999;animation:toastIn .3s ease;box-shadow:0 8px 32px rgba(0,212,170,.3)}
.toast.err{background:var(--err);color:#fff;box-shadow:0 8px 32px rgba(255,107,107,.3)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* LOADING */
.loader{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--t3);font-size:14px}
.spin{width:24px;height:24px;border:3px solid var(--bg3);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin-right:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px;color:var(--t3)}
.empty .icon{font-size:48px;margin-bottom:12px}
.empty .msg{font-size:14px}

/* OPERATOR SELECT */
.op-select{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:16px 0}
.op-btn{padding:14px;background:var(--bg3);border:2px solid transparent;border-radius:var(--r);text-align:center;cursor:pointer;transition:.15s;font-size:14px;font-weight:500}
.op-btn:active{transform:scale(.97)}
.op-btn.sel{border-color:var(--acc);background:var(--accD);color:var(--acc)}

/* DROPDOWN */
.durus-row{display:flex;gap:8px;align-items:center;margin-top:12px}
.durus-row select{flex:1}
.durus-row input{width:80px}

/* REFRESH PULL */
.pull-hint{text-align:center;padding:8px;font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <h1>⚙ ÖZLER ÜRETİM</h1>
  <div class="sync"><span class="dot on" id="syncDot"></span><span id="syncTxt">Bağlı</span></div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab act" onclick="switchTab('uretim')">🔧 Üretim</div>
  <div class="tab" onclick="switchTab('emirler')">📋 İş Emirleri</div>
  <div class="tab" onclick="switchTab('ozet')">📊 Özet</div>
</div>

<!-- CONTENT -->
<div class="content" id="mainContent">
  <div class="loader"><div class="spin"></div>Veriler yükleniyor...</div>
</div>

<!-- ENTRY MODAL -->
<div class="modal-bg" id="entryModal">
  <div class="modal">
    <div class="handle"></div>
    <h2 id="modalTitle">Üretim Girişi</h2>
    <div id="modalInfo"></div>
    <div class="inp-grp">
      <label>Operatör</label>
      <div class="op-select" id="opSelect"></div>
    </div>
    <div class="inp-grp">
      <label>Üretim Adedi</label>
      <input type="text" id="qtyInput" inputmode="numeric" pattern="[0-9]*" placeholder="0" readonly>
      <div class="numpad">
        <button onclick="numPad('1')">1</button><button onclick="numPad('2')">2</button><button onclick="numPad('3')">3</button><button onclick="numPad('C')" class="clr">C</button>
        <button onclick="numPad('4')">4</button><button onclick="numPad('5')">5</button><button onclick="numPad('6')">6</button><button onclick="numPad('⌫')" class="del">⌫</button>
        <button onclick="numPad('7')">7</button><button onclick="numPad('8')">8</button><button onclick="numPad('9')">9</button><button onclick="numPad('0')">0</button>
      </div>
    </div>
    <div class="durus-row" id="durusRow" style="display:none">
      <select id="durusKod"><option value="">Duruş kodu (opsiyonel)</option></select>
      <input type="text" id="durusDk" inputmode="numeric" placeholder="dk" style="font-size:16px;padding:14px;text-align:center">
    </div>
    <div style="margin-top:16px">
      <button class="btn primary" id="saveBtn" onclick="saveEntry()" disabled>✓ KAYDET</button>
      <button class="btn secondary" onclick="closeModal()">İptal</button>
    </div>
  </div>
</div>

<script>
// ═══ SUPABASE ═══
const _sbUrl='https://kudpuqqxxkhuxhhxqbjw.supabase.co';
const _sbKey='sb_publishable_duHYEBjaaf4wDQvZLf66hQ_tSmyDM4p';
const sb=window.supabase.createClient(_sbUrl,_sbKey);

let S={operations:[],stations:[],orders:[],workOrders:[],logs:[],malzemeler:[],operators:[],durusKodlari:[],recipes:[],bomTrees:[],kesimPlanlari:[],stokHareketler:[],consumption:[],fireLogs:[],warehouse:[],tedarikler:[],tedarikciler:[],customers:[],izinler:[],userLog:[]};
let _curTab='uretim';
let _selOp=null;
let _curWO=null;

// ═══ VERİ YÜKLEME ═══
async function loadData(){
  try{
    const{data,error}=await sb.from('ayarlar').select('value').eq('key','uys_data').single();
    if(error)throw error;
    if(data&&data.value){
      S=Object.assign({},S,JSON.parse(data.value));
      document.getElementById('syncDot').className='dot on';
      document.getElementById('syncTxt').textContent='Bağlı';
    }
  }catch(e){
    console.warn('Supabase yüklenemedi, localStorage deneniyor:',e.message);
    try{
      const lv=localStorage.getItem('uys_data');
      if(lv)S=Object.assign({},S,JSON.parse(lv));
      document.getElementById('syncDot').className='dot off';
      document.getElementById('syncTxt').textContent='Çevrimdışı';
    }catch(e2){}
  }
  render();
}

async function saveData(){
  const json=JSON.stringify(S);
  try{localStorage.setItem('uys_data',json);}catch(e){}
  try{
    await sb.from('ayarlar').upsert({key:'uys_data',value:json});
    showToast('Kaydedildi ✓');
  }catch(e){
    showToast('Kayıt hatası!','err');
  }
}

// ═══ RENDER ═══
function render(){
  const c=document.getElementById('mainContent');
  if(_curTab==='uretim')renderUretim(c);
  else if(_curTab==='emirler')renderEmirler(c);
  else if(_curTab==='ozet')renderOzet(c);
}

function renderUretim(c){
  // Aktif siparişlerin iş emirlerini malzeme grubuna göre göster
  const activeOrders=(S.orders||[]).filter(o=>!o.durum||o.durum!=='iptal');
  const wos=(S.workOrders||[]).filter(w=>{
    const ord=activeOrders.find(o=>o.id===w.orderId);
    return ord&&getWPct(w)<100;
  });

  if(wos.length===0){
    c.innerHTML='<div class="empty"><div class="icon">✅</div><div class="msg">Tüm işler tamamlandı</div></div>';
    return;
  }

  // Malzeme grubuna göre grupla
  const groups={};
  wos.forEach(w=>{
    const key=w.malkod||w.id;
    if(!groups[key])groups[key]={malkod:w.malkod,malad:w.malad,wos:[]};
    groups[key].wos.push(w);
  });

  let html='<div class="pull-hint">↓ Yenilemek için aşağı çek</div>';
  Object.values(groups).forEach(g=>{
    const totalHedef=g.wos.reduce((s,w)=>s+(w.hedef||0),0);
    const totalProd=g.wos.reduce((s,w)=>s+getProduced(w),0);
    const pct=totalHedef>0?Math.min(100,Math.round(totalProd/totalHedef*100)):0;
    const pctClass=pct>=100?'g':pct>=50?'a':pct>=25?'y':'r';
    const kirno=g.wos[0]?.kirno||'';
    const pillClass=kirno==='1'?'mm':kirno.startsWith('K')?'ks':'mk';
    const pillText=kirno==='1'?'MAMUL':kirno.startsWith('K')?'KESİM':'Y.MAMUL';

    html+=`<div class="card" onclick="openWO('${g.wos[0].id}')">
      <span class="pill ${pillClass}">${pillText}</span>
      <div class="lbl">${g.malkod||''}</div>
      <div class="val">${g.malad||'İsimsiz'}</div>
      <div class="sub">${totalProd} / ${totalHedef} adet</div>
      <div class="pbar"><div class="fill ${pctClass}" style="width:${pct}%"></div></div>
      <span class="badge ${pct>=100?'ok':pct>=50?'prog':'warn'}">%${pct}</span>
    </div>`;
  });
  c.innerHTML=html;
}

function renderEmirler(c){
  const wos=(S.workOrders||[]).slice().sort((a,b)=>(a.orderId||'').localeCompare(b.orderId||''));
  if(wos.length===0){c.innerHTML='<div class="empty"><div class="icon">📋</div><div class="msg">İş emri yok</div></div>';return;}

  let html='';
  wos.forEach(w=>{
    const ord=(S.orders||[]).find(o=>o.id===w.orderId);
    const pct=getWPct(w);
    const pctClass=pct>=100?'ok':pct>=50?'prog':'warn';
    html+=`<div class="card" onclick="openWO('${w.id}')">
      <div class="lbl">${ord?ord.siparisNo:'—'} · İE-${w.ieNo||w.sira||''}</div>
      <div class="val" style="font-size:16px">${w.malad||w.malkod||''}</div>
      <div class="sub">Hedef: ${w.hedef||0} · Üretim: ${getProduced(w)}</div>
      <div class="pbar"><div class="fill ${pct>=100?'g':pct>=50?'a':'y'}" style="width:${Math.min(100,pct)}%"></div></div>
      <span class="badge ${pctClass}">%${Math.round(pct)}</span>
    </div>`;
  });
  c.innerHTML=html;
}

function renderOzet(c){
  const today=new Date().toISOString().slice(0,10);
  const todayLogs=(S.logs||[]).filter(l=>(l.tarih||'').startsWith(today));
  const todayQty=todayLogs.reduce((s,l)=>s+(l.qty||0),0);
  const activeWOs=(S.workOrders||[]).filter(w=>getWPct(w)<100);
  const completedWOs=(S.workOrders||[]).filter(w=>getWPct(w)>=100);

  c.innerHTML=`
    <div class="card"><div class="lbl">BUGÜNKÜ ÜRETİM</div><div class="val" style="color:var(--acc)">${todayQty} adet</div><div class="sub">${todayLogs.length} giriş</div></div>
    <div class="card"><div class="lbl">AKTİF İŞ EMİRLERİ</div><div class="val">${activeWOs.length}</div></div>
    <div class="card"><div class="lbl">TAMAMLANAN İŞ EMİRLERİ</div><div class="val" style="color:var(--ok)">${completedWOs.length}</div></div>
    <div class="card"><div class="lbl">TOPLAM SİPARİŞ</div><div class="val">${(S.orders||[]).length}</div></div>
    <div style="margin-top:16px">
      <button class="btn secondary" onclick="loadData()">🔄 Verileri Yenile</button>
    </div>
  `;
}

// ═══ HESAPLAMALAR ═══
function getProduced(w){
  return(S.logs||[]).filter(l=>l.woId===w.id).reduce((s,l)=>s+(l.qty||0),0);
}
function getWPct(w){
  if(!w.hedef||w.hedef<=0)return 0;
  return Math.min(100,getProduced(w)/w.hedef*100);
}

// ═══ TAB ═══
function switchTab(t){
  _curTab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('act',['uretim','emirler','ozet'][i]===t);
  });
  render();
}

// ═══ MODAL ═══
function openWO(wid){
  const w=(S.workOrders||[]).find(x=>x.id===wid);
  if(!w)return;
  _curWO=w;
  _selOp=null;

  const ord=(S.orders||[]).find(o=>o.id===w.orderId);
  const produced=getProduced(w);
  const pct=getWPct(w);

  document.getElementById('modalTitle').textContent=w.malad||w.malkod||'Üretim Girişi';
  document.getElementById('modalInfo').innerHTML=`
    <div class="info-row"><span class="k">Sipariş</span><span class="v">${ord?ord.siparisNo:'—'}</span></div>
    <div class="info-row"><span class="k">İş Emri</span><span class="v">İE-${w.ieNo||w.sira||''}</span></div>
    <div class="info-row"><span class="k">Hedef</span><span class="v">${w.hedef||0}</span></div>
    <div class="info-row"><span class="k">Üretilen</span><span class="v">${produced}</span></div>
    <div class="info-row"><span class="k">Kalan</span><span class="v" style="color:var(--warn)">${Math.max(0,(w.hedef||0)-produced)}</span></div>
    <div class="info-row"><span class="k">İlerleme</span><span class="v" style="color:var(--acc)">%${Math.round(pct)}</span></div>
  `;

  // Operatör listesi
  const ops=S.operators||[];
  let opHtml='';
  ops.filter(o=>o.aktif!==false).forEach(o=>{
    opHtml+=`<div class="op-btn" data-oid="${o.id}" onclick="selectOp(this,'${o.id}')">${o.ad}</div>`;
  });
  if(ops.length===0)opHtml='<div style="color:var(--t3);font-size:13px;grid-column:1/-1">Operatör tanımlı değil</div>';
  document.getElementById('opSelect').innerHTML=opHtml;

  // Duruş kodları
  const dk=S.durusKodlari||[];
  let dkHtml='<option value="">Duruş yok</option>';
  dk.forEach(d=>{dkHtml+=`<option value="${d.kod}">${d.kod} — ${d.ad}</option>`;});
  document.getElementById('durusKod').innerHTML=dkHtml;
  document.getElementById('durusRow').style.display=dk.length>0?'flex':'none';

  document.getElementById('qtyInput').value='';
  document.getElementById('durusDk').value='';
  document.getElementById('saveBtn').disabled=true;
  document.getElementById('entryModal').classList.add('show');
}

function closeModal(){
  document.getElementById('entryModal').classList.remove('show');
  _curWO=null;_selOp=null;
}

function selectOp(el,oid){
  document.querySelectorAll('.op-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  _selOp=oid;
  checkSaveReady();
}

// ═══ NUMPAD ═══
function numPad(k){
  const inp=document.getElementById('qtyInput');
  let v=inp.value;
  if(k==='C'){v='';}
  else if(k==='⌫'){v=v.slice(0,-1);}
  else{v+=k;}
  inp.value=v;
  checkSaveReady();
}

function checkSaveReady(){
  const qty=parseInt(document.getElementById('qtyInput').value)||0;
  document.getElementById('saveBtn').disabled=!(qty>0);
}

// ═══ KAYDET ═══
async function saveEntry(){
  if(!_curWO)return;
  const qty=parseInt(document.getElementById('qtyInput').value)||0;
  if(qty<=0)return;

  const now=new Date();
  const tarih=now.toISOString().slice(0,10);
  const saat=now.toTimeString().slice(0,5);
  const durusKod=document.getElementById('durusKod')?.value||'';
  const durusDk=parseInt(document.getElementById('durusDk')?.value)||0;

  // uid üret
  let cnt=parseInt(localStorage.getItem('_uys_uid_cnt')||'0')+1;
  localStorage.setItem('_uys_uid_cnt',String(cnt));
  const logId='mob'+Date.now().toString(36)+cnt.toString(36);

  const logEntry={
    id:logId,
    woId:_curWO.id,
    tarih:tarih,
    saat:saat,
    qty:qty,
    operatorId:_selOp||null,
    vardiya:'',
    durusKod:durusKod,
    durusDk:durusDk,
    not:'Mobil giriş'
  };

  if(!S.logs)S.logs=[];
  S.logs.push(logEntry);

  closeModal();
  await saveData();
  render();
}

// ═══ TOAST ═══
function showToast(msg,type){
  const t=document.createElement('div');
  t.className='toast'+(type==='err'?' err':'');
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

// ═══ PULL TO REFRESH ═══
let _touchY=0;
document.addEventListener('touchstart',e=>{_touchY=e.touches[0].clientY;});

    showToast('Yenileniyor...');
    loadData();
  }
});
